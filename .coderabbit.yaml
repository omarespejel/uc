# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
tone_instructions: |
  Be direct and technical. Prioritize production bugs, cache invalidation mistakes,
  daemon safety issues, benchmark methodology flaws, and missing regression tests.
  Prefer actionable findings over style-only feedback.
reviews:
  profile: "assertive"
  request_changes_workflow: true
  high_level_summary: true
  review_status: true
  commit_status: true
  poem: false
  collapse_walkthrough: true
  changed_files_summary: true
  path_filters:
    - "!benchmarks/results/**"
  path_instructions:
    - path: "crates/**/src/**/*.rs"
      instructions: |
        Read AGENTS.md and docs/agent/PR_BOT_POLICY.md first.
        Focus on correctness, invalidation safety, deterministic outputs,
        daemon behavior, fallback behavior, and missing regression coverage.
        Treat cache false-hits as higher severity than false-misses.
    - path: "crates/**/tests/**"
      instructions: |
        Ensure tests cover edge cases, invalidation behavior, and failure paths.
        Flag cases where risky production changes do not add targeted regression tests.
    - path: "benchmarks/**"
      instructions: |
        Verify measurement methodology remains explicit and reproducible.
        Check daemon mode, pinning, sample counts, offline mode, and gate files.
        Flag methodology drift before performance claims.
    - path: ".github/workflows/**"
      instructions: |
        Check that workflows preserve deterministic validation and useful failure output.
    - path: "docs/**"
      instructions: |
        Flag stale commands, stale paths, or docs that drift from code and workflow behavior.
    - path: "scripts/**"
      instructions: |
        Check for shell safety (`set -euo pipefail`), portability within supported environments,
        and actionable failure messages.
  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
  tools:
    shellcheck:
      enabled: true
    markdownlint:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 90000
    yamllint:
      enabled: true
    gitleaks:
      enabled: true
    actionlint:
      enabled: true
    ruff:
      enabled: false
    biome:
      enabled: false
    hadolint:
      enabled: false
    checkov:
      enabled: false
    semgrep:
      enabled: false
    ast-grep:
chat:
  auto_reply: true
knowledge_base:
  opt_out: false
  learnings:
    scope: "auto"
  issues:
    scope: "auto"
  pull_requests:
    scope: "auto"
