name: benchmark-regression

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

env:
  SCARB_TOOLCHAIN_VERSION: 2.16.0
  SCARB_FIXTURE_TAG: v2.16.0
  CAIRO_CORELIB_TAG: v2.16.0
  SCARB_FIXTURE_SHA: 231227f3fe49cc813b1b018a67cf3b7080766e24
  CAIRO_CORELIB_SHA: 6a43d7c9419481fcb82376447fecf85c44d8fbbf
  AGENTIC_FIXTURE_SHA: 86679251313346279bf32d313536d851aaab932f
  MONERO_FIXTURE_SHA: fef80441c930f96134bd55c2ac9aad059ef3a149

jobs:
  benchmark-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Prepare native corelib source
        run: |
          set -euo pipefail
          CAIRO_ROOT="$RUNNER_TEMP/cairo-workspace"
          git clone --depth 1 --branch "$CAIRO_CORELIB_TAG" \
            https://github.com/starkware-libs/cairo.git "$CAIRO_ROOT/cairo"
          CAIRO_HEAD="$(git -C "$CAIRO_ROOT/cairo" rev-parse HEAD)"
          if [[ "$CAIRO_HEAD" != "$CAIRO_CORELIB_SHA" ]]; then
            echo "cairo tag $CAIRO_CORELIB_TAG resolved to unexpected commit $CAIRO_HEAD (expected $CAIRO_CORELIB_SHA)" >&2
            exit 1
          fi
          echo "UC_NATIVE_CORELIB_SRC=$CAIRO_ROOT/cairo/corelib/src" >> "$GITHUB_ENV"

      - name: Install Scarb
        uses: software-mansion/setup-scarb@9d86a1616deecc95e8e8435daf902c5d025dc8b8 # v1
        with:
          scarb-version: ${{ env.SCARB_TOOLCHAIN_VERSION }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Build uc CLI
        run: cargo build --release -p uc-cli

      - name: Run smoke stability benchmark cycles
        env:
          UC_NATIVE_BUILD_MODE: auto
          UC_NATIVE_DISALLOW_SCARB_FALLBACK: "0"
          UC_NATIVE_CORELIB_SRC: ${{ env.UC_NATIVE_CORELIB_SRC }}
        run: |
          chmod +x benchmarks/scripts/run_local_benchmarks.sh
          chmod +x benchmarks/scripts/run_stability_benchmarks.sh
          chmod +x benchmarks/scripts/gate_benchmark_summary.sh
          ./benchmarks/scripts/run_stability_benchmarks.sh \
            --matrix smoke \
            --runs 12 \
            --cold-runs 12 \
            --cycles 5 \
            --uc-daemon-mode require \
            --cpu-set 0 \
            --strict-pinning \
            --host-preflight warn \
            --gate-config benchmarks/gates/perf-gate-smoke.json

      - name: Run smoke compare-build gate
        env:
          UC_NATIVE_BUILD_MODE: require
          UC_NATIVE_DISALLOW_SCARB_FALLBACK: "1"
          UC_NATIVE_CORELIB_SRC: ${{ env.UC_NATIVE_CORELIB_SRC }}
        run: |
          ./target/release/uc compare-build \
            --manifest-path benchmarks/fixtures/scarb_smoke/Scarb.toml \
            --clean-before-each true \
            --output-path benchmarks/results/compare-smoke.json

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-results
          path: benchmarks/results/

  benchmark-research-strict:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Scarb
        uses: software-mansion/setup-scarb@9d86a1616deecc95e8e8435daf902c5d025dc8b8 # v1
        with:
          scarb-version: ${{ env.SCARB_TOOLCHAIN_VERSION }}

      - name: Install benchmark tools
        run: sudo apt-get update && sudo apt-get install -y jq util-linux

      - name: Prepare research workspace
        run: |
          set -euo pipefail
          RESEARCH_ROOT="$RUNNER_TEMP/research-workspace"
          mkdir -p "$RESEARCH_ROOT"
          git clone --depth 1 --branch "$SCARB_FIXTURE_TAG" \
            https://github.com/software-mansion/scarb.git "$RESEARCH_ROOT/scarb"
          SCARB_HEAD="$(git -C "$RESEARCH_ROOT/scarb" rev-parse HEAD)"
          if [[ "$SCARB_HEAD" != "$SCARB_FIXTURE_SHA" ]]; then
            echo "scarb tag $SCARB_FIXTURE_TAG resolved to unexpected commit $SCARB_HEAD (expected $SCARB_FIXTURE_SHA)" >&2
            exit 1
          fi
          CAIRO_ROOT="$RUNNER_TEMP/cairo-workspace"
          git clone --depth 1 --branch "$CAIRO_CORELIB_TAG" \
            https://github.com/starkware-libs/cairo.git "$CAIRO_ROOT/cairo"
          CAIRO_HEAD="$(git -C "$CAIRO_ROOT/cairo" rev-parse HEAD)"
          if [[ "$CAIRO_HEAD" != "$CAIRO_CORELIB_SHA" ]]; then
            echo "cairo tag $CAIRO_CORELIB_TAG resolved to unexpected commit $CAIRO_HEAD (expected $CAIRO_CORELIB_SHA)" >&2
            exit 1
          fi
          echo "UC_RESEARCH_ROOT=$RESEARCH_ROOT" >> "$GITHUB_ENV"
          echo "UC_NATIVE_CORELIB_SRC=$CAIRO_ROOT/cairo/corelib/src" >> "$GITHUB_ENV"

      - name: Build uc CLI
        run: cargo build --release -p uc-cli

      - name: Run strict-pinned research stability gate
        run: |
          chmod +x benchmarks/scripts/run_local_benchmarks.sh
          chmod +x benchmarks/scripts/run_stability_benchmarks.sh
          chmod +x benchmarks/scripts/gate_benchmark_summary.sh
          ./benchmarks/scripts/run_stability_benchmarks.sh \
            --matrix research \
            --workspace-root "$UC_RESEARCH_ROOT" \
            --runs 12 \
            --cold-runs 12 \
            --cycles 5 \
            --uc-daemon-mode require \
            --cpu-set 0 \
            --strict-pinning \
            --host-preflight require \
            --gate-config benchmarks/gates/perf-gate-research.json

      - name: Upload research benchmark artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-results-research
          path: benchmarks/results/

  native-only-supported:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Prepare research workspace
        run: |
          set -euo pipefail
          RESEARCH_ROOT="$RUNNER_TEMP/research-workspace"
          mkdir -p "$RESEARCH_ROOT"
          git clone --depth 1 --branch "$SCARB_FIXTURE_TAG" \
            https://github.com/software-mansion/scarb.git "$RESEARCH_ROOT/scarb"
          SCARB_HEAD="$(git -C "$RESEARCH_ROOT/scarb" rev-parse HEAD)"
          if [[ "$SCARB_HEAD" != "$SCARB_FIXTURE_SHA" ]]; then
            echo "scarb tag $SCARB_FIXTURE_TAG resolved to unexpected commit $SCARB_HEAD (expected $SCARB_FIXTURE_SHA)" >&2
            exit 1
          fi
          CAIRO_ROOT="$RUNNER_TEMP/cairo-workspace"
          git clone --depth 1 --branch "$CAIRO_CORELIB_TAG" \
            https://github.com/starkware-libs/cairo.git "$CAIRO_ROOT/cairo"
          CAIRO_HEAD="$(git -C "$CAIRO_ROOT/cairo" rev-parse HEAD)"
          if [[ "$CAIRO_HEAD" != "$CAIRO_CORELIB_SHA" ]]; then
            echo "cairo tag $CAIRO_CORELIB_TAG resolved to unexpected commit $CAIRO_HEAD (expected $CAIRO_CORELIB_SHA)" >&2
            exit 1
          fi
          echo "UC_RESEARCH_ROOT=$RESEARCH_ROOT" >> "$GITHUB_ENV"
          echo "UC_NATIVE_CORELIB_SRC=$CAIRO_ROOT/cairo/corelib/src" >> "$GITHUB_ENV"

      - name: Build uc CLI
        run: cargo build --release -p uc-cli

      - name: Enforce native-only builds on supported smoke/research fixtures
        env:
          UC_NATIVE_BUILD_MODE: require
          UC_NATIVE_DISALLOW_SCARB_FALLBACK: "1"
          UC_NATIVE_CORELIB_SRC: ${{ env.UC_NATIVE_CORELIB_SRC }}
        run: |
          chmod +x benchmarks/scripts/run_native_only_gate.sh
          ./benchmarks/scripts/run_native_only_gate.sh \
            --uc-bin ./target/release/uc \
            --results-dir benchmarks/results \
            --case benchmarks/fixtures/scarb_smoke/Scarb.toml smoke 0 \
            --case "$UC_RESEARCH_ROOT/scarb/examples/hello_world/Scarb.toml" research-hello-world 1 \
            --case "$UC_RESEARCH_ROOT/scarb/examples/workspaces/Scarb.toml" research-workspaces 0

      - name: Upload native-only artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: native-only-results
          path: benchmarks/results/

  native-real-repos-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Scarb
        uses: software-mansion/setup-scarb@9d86a1616deecc95e8e8435daf902c5d025dc8b8 # v1
        with:
          scarb-version: ${{ env.SCARB_TOOLCHAIN_VERSION }}

      - name: Prepare native corelib source
        run: |
          set -euo pipefail
          CAIRO_ROOT="$RUNNER_TEMP/cairo-workspace"
          git clone --depth 1 --branch "$CAIRO_CORELIB_TAG" \
            https://github.com/starkware-libs/cairo.git "$CAIRO_ROOT/cairo"
          CAIRO_HEAD="$(git -C "$CAIRO_ROOT/cairo" rev-parse HEAD)"
          if [[ "$CAIRO_HEAD" != "$CAIRO_CORELIB_SHA" ]]; then
            echo "cairo tag $CAIRO_CORELIB_TAG resolved to unexpected commit $CAIRO_HEAD (expected $CAIRO_CORELIB_SHA)" >&2
            exit 1
          fi
          echo "UC_NATIVE_CORELIB_SRC=$CAIRO_ROOT/cairo/corelib/src" >> "$GITHUB_ENV"

      - name: Build uc CLI
        run: cargo build --release -p uc-cli

      - name: Checkout real-world fixtures
        run: |
          set -euo pipefail
          REAL_REPOS_ROOT="$RUNNER_TEMP/uc-real-repos"
          mkdir -p "$REAL_REPOS_ROOT"

          git init "$REAL_REPOS_ROOT/starknet-agentic"
          git -C "$REAL_REPOS_ROOT/starknet-agentic" remote add origin \
            https://github.com/keep-starknet-strange/starknet-agentic.git
          git -C "$REAL_REPOS_ROOT/starknet-agentic" fetch --depth 1 origin "$AGENTIC_FIXTURE_SHA"
          git -C "$REAL_REPOS_ROOT/starknet-agentic" checkout --detach FETCH_HEAD
          AGENTIC_HEAD="$(git -C "$REAL_REPOS_ROOT/starknet-agentic" rev-parse HEAD)"
          if [[ "$AGENTIC_HEAD" != "$AGENTIC_FIXTURE_SHA" ]]; then
            echo "starknet-agentic SHA mismatch: got $AGENTIC_HEAD (expected $AGENTIC_FIXTURE_SHA)" >&2
            exit 1
          fi

          git init "$REAL_REPOS_ROOT/monero-starknet-atomic-swap"
          git -C "$REAL_REPOS_ROOT/monero-starknet-atomic-swap" remote add origin \
            https://github.com/omarespejel/monero-starknet-atomic-swap.git
          git -C "$REAL_REPOS_ROOT/monero-starknet-atomic-swap" fetch --depth 1 origin "$MONERO_FIXTURE_SHA"
          git -C "$REAL_REPOS_ROOT/monero-starknet-atomic-swap" checkout --detach FETCH_HEAD
          MONERO_HEAD="$(git -C "$REAL_REPOS_ROOT/monero-starknet-atomic-swap" rev-parse HEAD)"
          if [[ "$MONERO_HEAD" != "$MONERO_FIXTURE_SHA" ]]; then
            echo "monero-starknet-atomic-swap SHA mismatch: got $MONERO_HEAD (expected $MONERO_FIXTURE_SHA)" >&2
            exit 1
          fi
          echo "UC_REAL_REPOS_ROOT=$REAL_REPOS_ROOT" >> "$GITHUB_ENV"

      - name: Native strict smoke on supported starknet-agentic manifests
        env:
          UC_NATIVE_BUILD_MODE: require
          UC_NATIVE_DISALLOW_SCARB_FALLBACK: "1"
          UC_NATIVE_CORELIB_SRC: ${{ env.UC_NATIVE_CORELIB_SRC }}
        run: |
          chmod +x benchmarks/scripts/run_native_real_repo_smoke.sh
          ./benchmarks/scripts/run_native_real_repo_smoke.sh \
            --uc-bin ./target/release/uc \
            --results-dir benchmarks/results \
            --strict-case "$UC_REAL_REPOS_ROOT/starknet-agentic/contracts/huginn-registry/Scarb.toml" agentic-huginn-registry \
            --strict-case "$UC_REAL_REPOS_ROOT/starknet-agentic/contracts/agent-account/Scarb.toml" agentic-agent-account \
            --strict-case "$UC_REAL_REPOS_ROOT/starknet-agentic/contracts/session-account/Scarb.toml" agentic-session-account

      - name: UC smoke on agentic erc8004 (controlled fallback allowed)
        env:
          UC_NATIVE_BUILD_MODE: auto
          UC_NATIVE_DISALLOW_SCARB_FALLBACK: "0"
          UC_NATIVE_CORELIB_SRC: ${{ env.UC_NATIVE_CORELIB_SRC }}
        run: |
          chmod +x benchmarks/scripts/run_native_real_repo_smoke.sh
          ./benchmarks/scripts/run_native_real_repo_smoke.sh \
            --uc-bin ./target/release/uc \
            --results-dir benchmarks/results \
            --backend-case "$UC_REAL_REPOS_ROOT/starknet-agentic/contracts/erc8004-cairo/Scarb.toml" agentic-erc8004-cairo scarb,uc-native

      - name: Monero native smoke snapshot (controlled fallback allowed, non-blocking)
        env:
          UC_NATIVE_BUILD_MODE: auto
          UC_NATIVE_DISALLOW_SCARB_FALLBACK: "0"
          UC_NATIVE_CORELIB_SRC: ${{ env.UC_NATIVE_CORELIB_SRC }}
        run: |
          set +e
          chmod +x benchmarks/scripts/run_native_real_repo_smoke.sh
          ./benchmarks/scripts/run_native_real_repo_smoke.sh \
            --uc-bin ./target/release/uc \
            --results-dir benchmarks/results \
            --timeout-secs 300 \
            --backend-case "$UC_REAL_REPOS_ROOT/monero-starknet-atomic-swap/cairo/Scarb.toml" monero-cairo scarb,uc-native
          rc=$?
          set -e

          if [[ ! -f benchmarks/results/native-real-monero-cairo.log ]]; then
            echo "monero smoke snapshot did not produce a log file" >&2
            exit 1
          fi

          if [[ "$rc" -ne 0 ]]; then
            # TODO(roadmap#18): restore blocking monero smoke once the native
            # compiler no longer times out or falls back unexpectedly here.
            echo "monero smoke snapshot remains non-blocking; see benchmarks/results/native-real-monero-cairo.log" >&2
            tail -n 60 benchmarks/results/native-real-monero-cairo.log >&2 || true
          fi

      - name: Native auto fallback remains controlled for semver cairo-version requirements
        env:
          UC_NATIVE_BUILD_MODE: auto
          UC_NATIVE_DISALLOW_SCARB_FALLBACK: "0"
          UC_NATIVE_CORELIB_SRC: ${{ env.UC_NATIVE_CORELIB_SRC }}
        run: |
          set -euo pipefail
          UC_BIN="./target/release/uc"
          FIXTURE_ROOT="$RUNNER_TEMP/native-fallback-cairo-version-range"
          rm -rf "$FIXTURE_ROOT"
          cp -R benchmarks/fixtures/scarb_smoke "$FIXTURE_ROOT"
          python3 - <<'PY' "$FIXTURE_ROOT/Scarb.toml"
          from pathlib import Path
          import sys

          manifest_path = Path(sys.argv[1])
          text = manifest_path.read_text(encoding="utf-8")
          if "cairo-version" not in text:
              text = text.replace(
                  'edition = "2024_07"\n',
                  'edition = "2024_07"\ncairo-version = ">=2.14.0"\n',
                  1,
              )
          manifest_path.write_text(text, encoding="utf-8")
          PY
          REPORT_PATH="benchmarks/results/native-semver-cairo-version-auto.json"
          LOG_PATH="benchmarks/results/native-semver-cairo-version-auto.log"
          "$UC_BIN" build \
            --engine uc \
            --daemon-mode off \
            --manifest-path "$FIXTURE_ROOT/Scarb.toml" \
            --report-path "$REPORT_PATH" \
            >"$LOG_PATH" 2>&1
          python3 - <<'PY' "$REPORT_PATH"
          import json
          import sys
          from pathlib import Path

          report = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          if report.get("exit_code") != 0:
              raise SystemExit(f"fallback gate failed: uc build exited with {report.get('exit_code')}")
          command = report.get("command") or []
          if not command or command[0] != "scarb":
              raise SystemExit("fallback gate failed: expected scarb backend command in structured report")
          PY

      - name: Compare-build parity snapshot on supported agentic manifest
        env:
          UC_NATIVE_BUILD_MODE: require
          UC_NATIVE_DISALLOW_SCARB_FALLBACK: "1"
          UC_NATIVE_CORELIB_SRC: ${{ env.UC_NATIVE_CORELIB_SRC }}
        run: |
          set +e
          ./target/release/uc compare-build \
            --manifest-path "$UC_REAL_REPOS_ROOT/starknet-agentic/contracts/agent-account/Scarb.toml" \
            --clean-before-each true \
            --output-path benchmarks/results/compare-agentic-agent-account.json \
            > benchmarks/results/compare-agentic-agent-account.log 2>&1
          rc=$?
          set -e

          if [[ ! -f benchmarks/results/compare-agentic-agent-account.json ]]; then
            echo "compare-build parity snapshot failed to produce report" >&2
            cat benchmarks/results/compare-agentic-agent-account.log >&2
            exit 1
          fi

          if [[ "$rc" -ne 0 ]]; then
            # TODO(roadmap#14): make compare-build parity blocking after
            # native artifact parity reaches stable pass criteria on real repos.
            echo "compare-build reported mismatches; keeping non-blocking parity snapshot in this lane" >&2
            tail -n 40 benchmarks/results/compare-agentic-agent-account.log >&2
          fi

          python3 - <<'PY'
          import json
          from pathlib import Path

          report_path = Path("benchmarks/results/compare-agentic-agent-account.json")
          report = json.loads(report_path.read_text(encoding="utf-8"))
          print(
              "compare-build parity snapshot:",
              f"passed={report.get('passed')}",
              f"artifact_mismatch_count={report.get('artifact_mismatch_count')}",
          )
          PY

      - name: Upload real-repo smoke artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: native-real-repo-results
          path: benchmarks/results/

  determinism-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Linux/macOS are release-blocking targets in the current native rollout.
        # Windows determinism coverage is tracked separately and will be re-enabled
        # before widening the support matrix.
        os: [ubuntu-latest, macos-latest]
    env:
      # Lock context inputs so cross-platform checks compare equivalent conditions.
      UC_SCARB_VERSION_LINE: scarb 2.16.0 (determinism-lane)
      UC_BUILD_ENV_PREFIXES: ""
      UC_SKIP_SCARB_TOOLCHAIN_CHECK: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Scarb
        uses: software-mansion/setup-scarb@9d86a1616deecc95e8e8435daf902c5d025dc8b8 # v1
        with:
          scarb-version: ${{ env.SCARB_TOOLCHAIN_VERSION }}

      - name: Build uc CLI
        run: cargo build --release -p uc-cli

      - name: Capture fingerprint/session key
        shell: bash
        run: |
          mkdir -p benchmarks/results determinism
          UC_BIN="./target/release/uc"
          PYTHON_BIN="python3"
          if ! command -v "$PYTHON_BIN" >/dev/null 2>&1; then
            PYTHON_BIN="python"
          fi

          "$UC_BIN" build \
            --engine uc \
            --daemon-mode off \
            --manifest-path benchmarks/fixtures/scarb_smoke/Scarb.toml \
            --report-path benchmarks/results/cross-platform-${{ matrix.os }}.json

          "$PYTHON_BIN" - <<'PY'
          import json
          from pathlib import Path

          report_path = Path("benchmarks/results/cross-platform-${{ matrix.os }}.json")
          report = json.loads(report_path.read_text(encoding="utf-8"))
          Path("determinism/${{ matrix.os }}.fingerprint.txt").write_text(report["fingerprint"] + "\n", encoding="utf-8")
          Path("determinism/${{ matrix.os }}.session-key.txt").write_text(report["session_key"] + "\n", encoding="utf-8")
          PY

      - name: Upload determinism sample
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: determinism-${{ matrix.os }}
          path: determinism/

  determinism-verify:
    runs-on: ubuntu-latest
    needs: determinism-matrix
    steps:
      - name: Download determinism samples
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: determinism-*
          merge-multiple: true
          path: determinism

      - name: Assert Linux/macOS determinism
        shell: bash
        run: |
          set -euo pipefail
          ls -la determinism

          fp_unique_count="$(cat determinism/*.fingerprint.txt | tr -d '\r' | sort -u | wc -l | tr -d ' ')"
          sk_unique_count="$(cat determinism/*.session-key.txt | tr -d '\r' | sort -u | wc -l | tr -d ' ')"

          if [[ "$fp_unique_count" != "1" ]]; then
            echo "Fingerprint mismatch across Linux/macOS lanes:" >&2
            for f in determinism/*.fingerprint.txt; do
              echo "$(basename "$f"): $(tr -d '\r' < "$f")" >&2
            done
            exit 1
          fi

          if [[ "$sk_unique_count" != "1" ]]; then
            echo "Session key mismatch across Linux/macOS lanes:" >&2
            for f in determinism/*.session-key.txt; do
              echo "$(basename "$f"): $(tr -d '\r' < "$f")" >&2
            done
            exit 1
          fi

          echo "Linux/macOS fingerprint and session key are deterministic."
