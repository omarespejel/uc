name: benchmark-regression

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  benchmark-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Scarb
        uses: software-mansion/setup-scarb@v1

      - name: Install jq and zsh
        run: sudo apt-get update && sudo apt-get install -y jq zsh

      - name: Build uc CLI
        run: cargo build -p uc-cli

      - name: Run smoke stability benchmark cycles
        run: |
          chmod +x benchmarks/scripts/run_local_benchmarks.sh
          chmod +x benchmarks/scripts/run_stability_benchmarks.sh
          chmod +x benchmarks/scripts/gate_benchmark_summary.sh
          ./benchmarks/scripts/run_stability_benchmarks.sh \
            --matrix smoke \
            --runs 3 \
            --cold-runs 2 \
            --cycles 3 \
            --gate-config benchmarks/gates/perf-gate-smoke.json

      - name: Run smoke compare-build gate
        run: |
          ./target/debug/uc compare-build \
            --manifest-path benchmarks/fixtures/scarb_smoke/Scarb.toml \
            --clean-before-each true \
            --output-path benchmarks/results/compare-smoke.json

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/results/
